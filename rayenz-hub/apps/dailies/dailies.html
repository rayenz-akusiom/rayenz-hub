<div class="hub-sticky-chrome dailies-sticky-chrome">
   <header class="page_title site-header">
      <div class="site-header-start">
         <a id="pet-headshot-link" class="pet-headshot-link" href="https://www.neopets.com/petlookup.phtml?pet=Blue_Eyes_WhDragon" target="_blank" title="View pet profile">
            <img id="pet-headshot" class="pet-headshot" src="https://pets.neopets.com/cp/l88flmjv/4/1.png" alt="Main pet">
         </a>
         <h1>Rayenz's Dailies</h1>
      </div>
      <button type="button" id="settings-open" class="settings-gear" aria-label="Open settings" title="Settings">&#9881;</button>
   </header>

   <div class="settings-tray-body"></div>
</aside>

<div class="dailies-layout">

   <aside class="dailies-sidebar" id="dailies-books"></aside>
