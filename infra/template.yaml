AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Rayenz Hub API — local-first serverless backend

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 256
    Architectures:
      - x86_64

Parameters:
  HubApiKeySsmPath:
    Type: String
    Default: ''
    Description: SSM SecureString path (e.g. /rayenz-hub/prod/api-key). Leave empty for inline HubApiKey (local only).
  HubApiKey:
    Type: String
    Default: local-dev-key
    NoEcho: true
    Description: Inline API key for SAM local only. Production uses HubApiKeySsmPath.
  HubUserId:
    Type: String
    Default: default
  DynamoDbEndpoint:
    Type: String
    Default: ''
    Description: Leave empty for AWS; set to http://host.docker.internal:8000 for SAM local + DynamoDB Local

Conditions:
  UseLocalDynamo: !Not [!Equals [!Ref DynamoDbEndpoint, '']]
  UseSsmApiKey: !Not [!Equals [!Ref HubApiKeySsmPath, '']]

Resources:
  HubTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: HubTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  HubDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  HubApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../packages/api
      Handler: src/handler.handler
      Environment:
        Variables:
          HUB_TABLE_NAME: !Ref HubTable
          HUB_BUCKET_NAME: !Ref HubDataBucket
          HUB_API_KEY: !If
            - UseSsmApiKey
            - !Sub '{{resolve:ssm-secure:${HubApiKeySsmPath}}}'
            - !Ref HubApiKey
          HUB_USER_ID: !Ref HubUserId
          DYNAMODB_ENDPOINT: !If [UseLocalDynamo, !Ref DynamoDbEndpoint, !Ref AWS::NoValue]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HubTable
        - S3CrudPolicy:
            BucketName: !Ref HubDataBucket
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/health
            Method: GET
        SettingsGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/settings/{domain}
            Method: GET
        SettingsPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/settings/{domain}
            Method: PUT
        ProfilesList:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/profiles
            Method: GET
        ProfileGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/profiles/{deckId}
            Method: GET
        ProfilePut:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/profiles/{deckId}
            Method: PUT
        DecksList:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/decks
            Method: GET
        DeckGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/decks/{deckId}
            Method: GET
        DeckPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/decks/{deckId}
            Method: PUT
        DeckDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/decks/{deckId}
            Method: DELETE
        ReviewProgressGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/review-progress/{fileId}
            Method: GET
        ReviewProgressPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/review-progress/{fileId}
            Method: PUT
        SetPoolGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/set-pools/{codesKey}
            Method: GET
        SetPoolPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref HubHttpApi
            Path: /v1/set-pools/{codesKey}
            Method: PUT
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handler.ts

  HubHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - GET
          - PUT
          - DELETE
          - OPTIONS

Outputs:
  HubApiUrl:
    Description: HTTP API endpoint
    Value: !Sub 'https://${HubHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}'
  HubTableName:
    Value: !Ref HubTable
  HubDataBucketName:
    Value: !Ref HubDataBucket
